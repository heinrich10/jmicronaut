flyway.datasources.default.enabled=true
datasources.default.password=
datasources.default.dialect=h2
micronaut.application.name=app
datasources.default.url=jdbc:h2:mem:devDb;LOCK_TIMEOUT=10000;DB_CLOSE_ON_EXIT=FALSE
datasources.default.username=sa
datasources.default.driver-class-name=org.h2.Driver

# HikariCP connection pool tuning
datasources.default.maximum-pool-size=10
datasources.default.minimum-idle=5
datasources.default.connection-timeout=5000
datasources.default.idle-timeout=600000
datasources.default.max-lifetime=1800000

# Management endpoints are exposed without authentication for demo purposes.
# In production, restrict or secure these endpoints.
endpoints.health.enabled=true
endpoints.health.details-visible=anonymous
endpoints.info.enabled=true
endpoints.info.sensitive=false